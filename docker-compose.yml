version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shule360_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shule360_db
      POSTGRES_USER: shule360_user
      POSTGRES_PASSWORD: shule360_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shule360_user -d shule360_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shule360_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shule360_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://shule360_user:shule360_password@postgres:5432/shule360_db
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shule360_frontend
    restart: unless-stopped
    env_file: ./frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: shule360_ai
    restart: unless-stopped
    env_file: ./ai-service/.env
    environment:
      DATABASE_URL: postgresql://shule360_user:shule360_password@postgres:5432/shule360_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ai-service:/app
      - ai_models:/app/models

volumes:
  postgres_data:
  ai_models:
